<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>铜排展开软件 | Copper Bar Unfolder</title>
<style>
body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; margin: 20px; background: #1e1e1e; color: #d4d4d4; }
h1 { color: #569cd6; margin-bottom: 4px; }
.card { background: #252526; border: 1px solid #444; border-radius: 6px; padding: 16px; margin: 12px 0; }
label { margin: 0 4px 0 12px; font-size: 13px; }
input[type=number] { width: 80px; background: #3c3c3c; color: #d4d4d4; border: 1px solid #555; padding: 3px 4px; font-size: 13px; }
button { background: #0e639c; color: #fff; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; margin: 4px; }
button:hover { background: #1177bb; }
button:disabled { background: #555; cursor: not-allowed; }
button.running { background: #b8860b; pointer-events: none; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.spinner { display:none; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation: spin 0.8s linear infinite; vertical-align:middle; margin-left:8px; }
#langSwitch { float: right; background: #333; border: 1px solid #555; color: #bbb; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 4px; }
#langSwitch:hover { background: #444; color: #fff; }
#status { padding: 8px; margin: 8px 0; border-radius: 4px; }
.success { background: #1e3a1e; color: #4ec94e; }
.error { background: #3a1e1e; color: #e74c3c; }
.info { background: #1e2e3a; color: #569cd6; }
#downloadProgress { display:none; margin: 8px 0; }
#progressBar { width:100%; height:8px; background:#333; border-radius:4px; overflow:hidden; }
#progressFill { height:100%; width:0%; background:linear-gradient(90deg, #0e639c, #4ec94e); border-radius:4px; transition: width 0.3s; }
#progressText { font-size:12px; color:#888; margin-top:4px; }
</style>
</head>
<body>

<button id="langSwitch" onclick="toggleLang()">English</button>
<h1 id="title">铜排展开软件 <span style="font-size:0.7em;color:#888;font-weight:normal;">| Copper Bar Unfolder</span></h1>
<p id="subtitle" style="color:#888;font-size:13px;margin-top:0;">上传 STEP 模型 → 一键展平 → 下载结果</p>

<div class="card" style="text-align:center;padding:12px;">
  <img src="CopperBar.png" alt="铜排示例" style="max-width:100%;max-height:320px;border-radius:4px;">
  <p id="imgCaption" style="color:#888;font-size:12px;margin:8px 0 0 0;">支持平面折弯、垂直折弯、扭转等多种铜排类型</p>
</div>

<div class="card">
  <h3 id="instrTitle">使用说明</h3>
  <ol id="instrList" style="margin:4px 0;padding-left:20px;font-size:13px;color:#b0b0b0;line-height:1.8;">
  </ol>
</div>

<div class="card">
  <h3 id="fileTitle">选择文件</h3>
  <input type="file" id="fileInput" accept=".step,.stp">
</div>

<div class="card">
  <h3 id="paramTitle">参数设置</h3>
  <p style="white-space:nowrap;">
    <label id="lblFlatK">平面K系数:</label><input type="number" id="flatK" value="-1" step="0.01">
    <label id="lblFlatR">平面弯曲半径:</label><input type="number" id="flatR" value="-1" step="0.01">
    <label id="lblVertK">垂直K系数:</label><input type="number" id="vertK" value="-1" step="0.01">
    <label id="lblVertR">垂直弯曲半径:</label><input type="number" id="vertR" value="-1" step="0.01">
    <label id="lblTwist">扭转系数:</label><input type="number" id="twistC" value="1.0" step="0.01">
  </p>
</div>

<div class="card">
  <h3 id="actionTitle">操作</h3>
  <button id="btnComputeBox" disabled>获取展平后的 STEP 模型 <span class="spinner" id="computeSpinner"></span></button>
</div>

<div id="status"></div>

<div id="downloadProgress">
  <div id="progressBar"><div id="progressFill"></div></div>
  <div id="progressText"></div>
</div>

<div class="card" id="downloadCard" style="display:none;">
  <h3 id="dlTitle">展平模型下载</h3>
  <a id="downloadLink" href="#" download="unfolded_box.stp" style="display:inline-block;background:#0e639c;color:#fff;padding:10px 24px;border-radius:4px;text-decoration:none;font-size:15px;">下载展平后的 STEP 文件</a>
  <span id="downloadSize" style="margin-left:12px;color:#888;font-size:13px;"></span>
</div>

<script type="module">
import SheetMetalUnfolderModule from './sheet_metal_unfolder.js';

let mod = null;
let stepBuffer = null;
let lang = 'zh';

const T = {
  zh: {
    subtitle: '上传 STEP 模型 → 一键展平 → 下载结果',
    instrTitle: '使用说明',
    instr: [
      '选择铜排的 <code style="background:#3c3c3c;padding:1px 5px;border-radius:3px;">.step</code> 或 <code style="background:#3c3c3c;padding:1px 5px;border-radius:3px;">.stp</code> 三维模型文件。',
      '调整参数（默认 -1 表示使用自动计算值，通常无需修改）。',
      '点击"获取展平后的 STEP 模型"按钮，等待计算完成。',
      '在下方"展平模型下载"区域点击链接，即可下载展开后的 STEP 文件。'
    ],
    fileTitle: '选择文件',
    paramTitle: '参数设置',
    lblFlatK: '平面K系数:',
    lblFlatR: '平面弯曲半径:',
    lblVertK: '垂直K系数:',
    lblVertR: '垂直弯曲半径:',
    lblTwist: '扭转系数:',
    actionTitle: '操作',
    computeBtn: '获取展平后的 STEP 模型',
    dlTitle: '展平模型下载',
    dlLink: '下载展平后的 STEP 文件',
    loading: '正在下载展开算法...',
    loaded: '算法下载完成，初始化中...',
    loadFailed: '算法下载失败',
    noFile: '请先加载 STEP 文件',
    computing: '正在计算并展平模型...',
    success: '计算 + 展平模型 成功',
    failed: '计算失败',
    fileLoaded: '已加载',
    imgCaption: '支持平面折弯、垂直折弯、扭转等多种铜排类型',
  },
  en: {
    subtitle: 'Upload STEP model → One-click unfold → Download result',
    instrTitle: 'Instructions',
    instr: [
      'Select a copper bar <code style="background:#3c3c3c;padding:1px 5px;border-radius:3px;">.step</code> or <code style="background:#3c3c3c;padding:1px 5px;border-radius:3px;">.stp</code> 3D model file.',
      'Adjust parameters (default -1 means auto-calculated, usually no change needed).',
      'Click "Get Unfolded STEP Model", wait for computation to finish.',
      'Click the download link in the "Unfolded Model Download" section to get the result STEP file.'
    ],
    fileTitle: 'Select File',
    paramTitle: 'Parameters',
    lblFlatK: 'Flat K-Factor:',
    lblFlatR: 'Flat Bend Radius:',
    lblVertK: 'Vertical K-Factor:',
    lblVertR: 'Vertical Bend Radius:',
    lblTwist: 'Twist Coefficient:',
    actionTitle: 'Action',
    computeBtn: 'Get Unfolded STEP Model',
    dlTitle: 'Unfolded Model Download',
    dlLink: 'Download Unfolded STEP File',
    loading: 'Downloading unfolding engine...',
    loaded: 'Engine downloaded, initializing...',
    loadFailed: 'Engine download failed',
    noFile: 'Please load a STEP file first',
    computing: 'Computing and unfolding...',
    success: 'Compute + Unfold succeeded',
    failed: 'Compute failed',
    fileLoaded: 'Loaded',
    imgCaption: 'Supports flat bends, vertical bends, twists and more copper bar types',
  }
};

function t(key) { return T[lang][key]; }

function applyLang() {
  document.getElementById('subtitle').textContent = t('subtitle');
  document.getElementById('instrTitle').textContent = t('instrTitle');
  const ol = document.getElementById('instrList');
  ol.innerHTML = t('instr').map(i => '<li>' + i + '</li>').join('');
  document.getElementById('fileTitle').textContent = t('fileTitle');
  document.getElementById('paramTitle').textContent = t('paramTitle');
  document.getElementById('lblFlatK').textContent = t('lblFlatK');
  document.getElementById('lblFlatR').textContent = t('lblFlatR');
  document.getElementById('lblVertK').textContent = t('lblVertK');
  document.getElementById('lblVertR').textContent = t('lblVertR');
  document.getElementById('lblTwist').textContent = t('lblTwist');
  document.getElementById('actionTitle').textContent = t('actionTitle');
  document.getElementById('btnComputeBox').innerHTML = t('computeBtn') + ' <span class="spinner" id="computeSpinner"></span>';
  document.getElementById('dlTitle').textContent = t('dlTitle');
  document.getElementById('downloadLink').textContent = t('dlLink');
  document.getElementById('imgCaption').textContent = t('imgCaption');
  document.getElementById('langSwitch').textContent = lang === 'zh' ? 'English' : '中文';
}

window.toggleLang = function() {
  lang = lang === 'zh' ? 'en' : 'zh';
  applyLang();
  // Refresh status messages if any
  const st = document.getElementById('status');
  if (st.className === 'info' && st.textContent) {
    if (st.textContent.includes('加载') || st.textContent.includes('计算') || st.textContent.includes('已加载'))
      showStatus('info', st._rawMsg || '');
  }
};

function showProgress(percent, msg) {
  const el = document.getElementById('downloadProgress');
  el.style.display = 'block';
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressText').textContent = msg + ' (' + percent.toFixed(0) + '%)';
}

function hideProgress() {
  document.getElementById('downloadProgress').style.display = 'none';
}

async function init() {
    applyLang();

    const wasmUrl = new URL('./sheet_metal_unfolder.wasm', import.meta.url).href;
    const wasmSizeMB = 5.5; // gzip compressed size, approximate

    // First, try to get actual WASM file size via HEAD request
    let totalBytes = wasmSizeMB * 1024 * 1024;
    try {
      const headResp = await fetch(wasmUrl, { method: 'HEAD' });
      if (headResp.ok) {
        const cl = headResp.headers.get('content-length');
        if (cl) totalBytes = parseInt(cl);
      }
    } catch(e) {}

    showStatus('info', t('loading'));
    showProgress(0, lang === 'zh' ? '正在连接服务器...' : 'Connecting to server...');

    try {
        mod = await SheetMetalUnfolderModule({
            print: t => console.log('[out]', t),
            printErr: t => console.error('[err]', t),
            instantiateWasm: function(imports, successCallback) {
              const xhr = new XMLHttpRequest();
              xhr.open('GET', wasmUrl, true);
              xhr.responseType = 'arraybuffer';

              let lastPercent = 0;
              xhr.onprogress = function(e) {
                if (e.lengthComputable && e.total > 0) {
                  totalBytes = e.total;
                }
                const pct = totalBytes > 0 ? Math.min(99, (e.loaded / totalBytes) * 100) : lastPercent;
                if (pct - lastPercent > 0.5 || pct >= 99) {
                  lastPercent = pct;
                  const loadedMB = (e.loaded / 1024 / 1024).toFixed(1);
                  const totalMB = (totalBytes / 1024 / 1024).toFixed(1);
                  showProgress(pct, (lang === 'zh' ? '正在下载展开算法' : 'Downloading unfolding engine') 
                    + ' ' + loadedMB + ' / ' + totalMB + ' MB');
                }
              };

              xhr.onload = function() {
                if (xhr.status === 200 || xhr.status === 304 || xhr.status === 0) {
                  showProgress(99, lang === 'zh' ? '正在编译算法...' : 'Compiling engine...');
                  const wasmBinary = xhr.response;
                  WebAssembly.instantiate(wasmBinary, imports).then(function(result) {
                    showProgress(100, lang === 'zh' ? '算法就绪' : 'Engine ready');
                    successCallback(result.instance, result.module);
                  }).catch(function(err) {
                    showStatus('error', t('loadFailed') + ': ' + err.message);
                    hideProgress();
                  });
                } else {
                  showStatus('error', t('loadFailed') + ': HTTP ' + xhr.status);
                  hideProgress();
                }
              };

              xhr.onerror = function() {
                showStatus('error', t('loadFailed'));
                hideProgress();
              };

              xhr.send();
              return {};
            },
        });
        hideProgress();
        showStatus('success', t('loaded'));
        document.getElementById('btnComputeBox').disabled = false;
    } catch (e) {
        hideProgress();
        showStatus('error', t('loadFailed') + ': ' + e.message);
    }
}

function showStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = type;
    el._rawMsg = msg;
    el.textContent = msg;
}

function getParams() {
    return {
        flatK: parseFloat(document.getElementById('flatK').value),
        flatR: parseFloat(document.getElementById('flatR').value),
        vertK: parseFloat(document.getElementById('vertK').value),
        vertR: parseFloat(document.getElementById('vertR').value),
        twistC: parseFloat(document.getElementById('twistC').value),
    };
}

async function doComputeBox() {
    if (!stepBuffer) { showStatus('error', t('noFile')); return; }
    const p = getParams();
    const btn = document.getElementById('btnComputeBox');
    const spinner = document.getElementById('computeSpinner');
    btn.classList.add('running');
    btn.disabled = true;
    spinner.style.display = 'inline-block';
    btn.innerHTML = t('computing') + '... <span class="spinner" id="computeSpinner" style="display:inline-block;"></span>';
    showStatus('info', t('computing'));

    const ptr = mod._malloc(stepBuffer.byteLength);
    mod.writeArrayToMemory(new Uint8Array(stepBuffer), ptr);

    const resultPtr = mod._computeManufactureFeatureAndBox(
        ptr, stepBuffer.byteLength,
        p.flatK, p.flatR, p.vertK, p.vertR, p.twistC
    );

    const result = mod.UTF8ToString(resultPtr);
    const err = mod.UTF8ToString(mod._getLastError());

    mod._freeResult(resultPtr);
    mod._free(ptr);

    if (result && result.length > 2) {
        showStatus('success', t('success'));
        const sepIdx = result.indexOf('\n---STEP_DATA---\n');
        if (sepIdx >= 0) {
            const stepPart = result.substring(sepIdx + '\n---STEP_DATA---\n'.length);
            const blob = new Blob([stepPart], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const card = document.getElementById('downloadCard');
            const link = document.getElementById('downloadLink');
            link.href = url;
            document.getElementById('downloadSize').textContent = `(${(stepPart.length / 1024).toFixed(1)} KB)`;
            card.style.display = 'block';
        } else {
            document.getElementById('downloadCard').style.display = 'none';
        }
    } else {
        showStatus('error', t('failed') + ': ' + err);
    }

    // Restore button after computation
    btn.classList.remove('running');
    btn.disabled = false;
    btn.innerHTML = t('computeBtn') + ' <span class="spinner" id="computeSpinner"></span>';
}

document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    stepBuffer = await file.arrayBuffer();
    showStatus('info', t('fileLoaded') + `: ${file.name} (${(stepBuffer.byteLength / 1024).toFixed(1)} KB)`);
});

document.getElementById('btnComputeBox').addEventListener('click', doComputeBox);

init();
</script>
</body>
</html>
